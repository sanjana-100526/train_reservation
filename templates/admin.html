<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            background: #0f0f1a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        /* 🔥 STATS CARDS */
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
        }

        .card {
            background: #1c1c2e;
            padding: 15px;
            border-radius: 10px;
            width: 180px;
            box-shadow: 0 0 10px #00ffe5;
        }

        .card h2 {
            color: #00ffe5;
        }

        /* TABLE */
        table {
            margin: auto;
            width: 80%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #444;
        }

        th {
            background: #00ffe5;
            color: black;
        }

        tr:hover {
            background: #222;
        }

        .btn {
            padding: 5px 10px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        a {
            color: #00ffe5;
            text-decoration: none;
        }
    </style>

</head>

<body>

<h1>👑 Admin Dashboard</h1>

<!-- 🔥 STATS SECTION (ADD HERE TOP) -->
<div class="stats">

    <div class="card">
        <h3>Total Bookings</h3>
        <h2>{{ total_bookings }}</h2>
    </div>

    <div class="card">
        <h3>Total Passengers</h3>
        <h2>{{ total_passengers }}</h2>
    </div>

    <div class="card">
        <h3>Trains Used</h3>
        <h2>{{ total_trains }}</h2>
    </div>

</div>

<!-- 📋 TABLE -->
<table>

    <tr>
        <th>Train</th>
        <th>Seat</th>
        <th>Passenger</th>
        <th>Action</th>
    </tr>
    
    {% for id, train, seat, name in bookings %}
    

    <tr>
        <td>{{ train }}</td>
        <td>{{ seat }}</td>
        <td>{{ name }}</td>
        <td>
            <a href="/cancel/{{ id }}">
              <button class="btn">Delete</button>
            </a>
        </td>
    </tr>

    {% endfor %}

</table>

<br>

<a href="/">Back to Home</a>

</body>

</html>
