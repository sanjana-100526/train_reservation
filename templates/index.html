<!DOCTYPE html>
<html>

<head>
    <title>Train Reservation</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Available Trains</h1>

{% if "user" in session %}
    <p>Welcome {{ session["user"] }} ({{ session["role"] }})</p>
    <a href="/logout"><button>Logout</button></a>
{% endif %}

{% for train in trains %}

<a href="/train/{{ train | replace(' ', '-') }}">
    <button>{{ train }}</button>
</a>

<br><br>

{% endfor %}

<h2>Book Your Ticket</h2>

<form action="/search" method="POST">

    <input type="text" name="from" placeholder="From" required>
    <input type="text" name="to" placeholder="To" required>
    <input type="date" name="date" required>

    <button type="submit">Search Trains</button>

</form>
<!-- <audio controls autoplay loop>
    <source src="{{ url_for('static', filename='music.mp3') }}" type="audio/mpeg">
</audio> -->

</body>

</html>
