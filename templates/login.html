<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background: #0f0f1a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        form {
            background: #1c1c2e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px #00ffe5;
            text-align: center;
        }

        input {
            width: 250px;
            padding: 10px;
            margin: 10px;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 270px;
            padding: 10px;
            background: #00ffe5;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        a {
            color: #00ffe5;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body>

<h1>🚆 Train Login</h1>

<form method="POST">

    <input type="text" name="username" placeholder="Username" required>
    <br>

    <input type="password" name="password" placeholder="Password" required>
    <br>

    <button type="submit">Login</button>

    <br><br>

    <!-- 🔥 SIGNUP LINK -->
    <a href="/signup">Create new account</a>

</form>

</body>

</html>
